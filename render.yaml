services:
  - type: web
    name: projeto-treino
    runtime: node
    buildCommand: npm install
    startCommand: npm start

    # Banco de dados: Turso (cloud) — persiste entre deploys sem disco
    # TURSO_TOKEN deve ser configurado como variável secreta no painel do Render
    envVars:
      - key: TURSO_URL
        value: libsql://up-consult-gerenciador-de-pastas-jota-jota07.aws-us-west-2.turso.io
      - key: TURSO_TOKEN
        sync: false   # valor secreto — definir manualmente no painel do Render

      # Cloudinary (uploads persistentes — nao se perdem em deploys)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false   # definir manualmente no painel do Render
      - key: CLOUDINARY_API_KEY
        sync: false   # definir manualmente no painel do Render
      - key: CLOUDINARY_API_SECRET
        sync: false   # definir manualmente no painel do Render
